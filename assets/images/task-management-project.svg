<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad2)"/>
  
  <!-- Top Bar -->
  <rect x="0" y="0" width="600" height="60" fill="#000000" opacity="0.5"/>
  <rect x="0" y="0" width="600" height="3" fill="url(#redGrad2)"/>
  
  <!-- Task Board Icon -->
  <g transform="translate(220, 120)">
    <!-- Board -->
    <rect x="0" y="0" width="160" height="120" fill="none" stroke="#ff0000" stroke-width="3" rx="5"/>
    
    <!-- Task Cards -->
    <rect x="15" y="15" width="60" height="25" fill="#ff0000" opacity="0.8" rx="3"/>
    <rect x="85" y="15" width="60" height="25" fill="#ff0000" opacity="0.5" rx="3"/>
    <rect x="15" y="50" width="60" height="25" fill="#ff0000" opacity="0.6" rx="3"/>
    <rect x="85" y="50" width="60" height="25" fill="#ff0000" opacity="0.3" rx="3"/>
    <rect x="15" y="85" width="60" height="25" fill="#ff0000" opacity="0.4" rx="3"/>
    
    <!-- Checkmarks -->
    <path d="M 25 26 L 30 31 L 38 22" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 25 61 L 30 66 L 38 57" stroke="#000000" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="270" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff0000" text-anchor="middle">
    Task Management App
  </text>
  
  <!-- Subtitle -->
  <text x="300" y="300" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.7">
    Collaborative Team Workspace
  </text>
  
  <!-- Bottom Accent -->
  <rect x="0" y="397" width="600" height="3" fill="url(#redGrad2)"/>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="350" r="3" fill="#ff0000" opacity="0.5"/>
  <circle cx="550" cy="350" r="3" fill="#ff0000" opacity="0.5"/>
  <rect x="230" y="320" width="140" height="2" fill="#ff0000" opacity="0.3"/>
</svg>
